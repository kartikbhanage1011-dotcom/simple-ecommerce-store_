<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase | Complete E-commerce Store</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #f5f5f5;
    color: #111827;
}

/* Navbar */
nav {
    background-color: #111827;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h2 {
    color: #38bdf8;
    font-size: 24px;
}

nav button {
    background-color: #2563eb;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
}

nav button:hover {
    background-color: #1e40af;
}

/* Hero Section */
.hero {
    background: linear-gradient(to right, #2563eb, #38bdf8);
    color: white;
    padding: 60px 20px;
    text-align: center;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
}

/* Products Section */
.products {
    padding: 30px;
}

.products h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* Product Card */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    border-radius: 5px;
}

.card h3 {
    margin: 10px 0;
    font-size: 20px;
}

.card p {
    color: green;
    font-weight: bold;
    margin-bottom: 10px;
}

.card button {
    background-color: #16a34a;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}

.card button:hover {
    background-color: #15803d;
}

/* Cart Section */
.cart {
    background: white;
    margin: 30px;
    padding: 20px;
    border-radius: 10px;
}

.cart h2 {
    font-size: 24px;
    margin-bottom: 10px;
}

.cart ul {
    list-style: none;
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
    padding-left: 10px;
}

.cart li {
    margin-bottom: 8px;
}

.cart button {
    margin-top: 15px;
    background-color: #2563eb;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}

.cart button:hover {
    background-color: #1e40af;
}

/* Footer */
footer {
    background-color: #111827;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}

/* Responsive */
@media(max-width:600px){
    .hero h1 { font-size: 28px; }
    .products h2 { font-size: 24px; }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>ShopEase</h2>
    <button onclick="alert('Login feature coming soon')">Login</button>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>Welcome to ShopEase</h1>
    <p>Discover the best products at amazing prices</p>
</section>

<!-- Products Section -->
<section class="products">
    <h2>Featured Products</h2>
    <div class="grid" id="productList">
        <!-- Products loaded by JS -->
    </div>
</section>

<!-- Cart Section -->
<section class="cart">
    <h2>🛒 Shopping Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="placeOrder()">Place Order</button>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 ShopEase | Internship Project | Frontend Only</p>
</footer>

<!-- JS -->
<script>
// Product Data - LONG list for more content
const products = [
    {name:"Laptop", price:45000},
    {name:"Smartphone", price:18000},
    {name:"Headphones", price:2500},
    {name:"Keyboard", price:1200},
    {name:"Mouse", price:800},
    {name:"Smartwatch", price:4500},
    {name:"Bluetooth Speaker", price:1500},
    {name:"Camera", price:35000},
    {name:"Tablet", price:12000},
    {name:"Gaming Chair", price:8000},
    {name:"Desk Lamp", price:700},
    {name:"USB Hub", price:400},
    {name:"External Hard Drive", price:3500},
    {name:"Microphone", price:3000},
    {name:"Webcam", price:2000}
];

const productList = document.getElementById("productList");
const cartItems = document.getElementById("cartItems");
const totalAmount = document.getElementById("total");

let cart = [];
let total = 0;

// Load products dynamically
products.forEach(p => {
    productList.innerHTML += `
        <div class="card">
            <img src="https://via.placeholder.com/200" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
        </div>
    `;
});

// Add to Cart
function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCart();
}

// Update Cart
function updateCart() {
    cartItems.innerHTML = "";
    cart.forEach(item => {
        cartItems.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
    });
    totalAmount.innerText = total;
}

// Place Order
function placeOrder() {
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }
    alert("Order placed successfully!\nTotal: ₹" + total);
    cart = [];
    total = 0;
    updateCart();
}
</script>

</body>
</html>
